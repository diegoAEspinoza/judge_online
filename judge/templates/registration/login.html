{% extends "judge/base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Entrar a PyJudge</h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
                </form>
                <div class="mt-3 text-center">
                    <small class="text-muted">¿No tienes cuenta? Contacta al profesor.</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
